name: 🚀 Super Ultra Typescript Deploy
description: The Ultimate TypeScript CI/CD Pipeline

branding:
  icon: zap
  color: green



on:

  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        type: choice
        options:
          - both
          - github-pages
          - netlify
        default: both

      mode:
        description: Deployment mode
        type: choice
        options:
          - preview
          - production
        default: production

  pull_request:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

env:
  NODE_VERSION: 20
  DIST_DIR: dist
  BUNDLE_LIMIT_KB: 5000

concurrency:
  group: super-ultra-${{ github.ref }}
  cancel-in-progress: true

jobs:

# =========================
# BUILD + STRICT CHECK
# =========================

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: TypeScript strict check
        run: npx tsc --noEmit --strict

      - name: ESLint strict
        run: npx eslint . --max-warnings=0

      - name: Build
        run: npm run build

      - name: Verify dist
        run: |
          if [ ! -d "${{ env.DIST_DIR }}" ]; then
            echo "dist not found"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist

# =========================
# BUNDLE ANALYSIS
# =========================

  bundle-analysis:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - run: npm install -g source-map-explorer

      - name: Bundle size
        run: |
          SIZE=$(du -sk dist | cut -f1)
          echo "Bundle size: $SIZE KB"

          if [ "$SIZE" -gt "$BUNDLE_LIMIT_KB" ]; then
            echo "Bundle too large"
            exit 1
          fi

      - name: File analysis
        run: |
          find dist -type f -name "*.js" -exec du -h {} \;

# =========================
# NETLIFY PREVIEW
# =========================

  netlify-preview:
    needs: bundle-analysis
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - run: npm install -g netlify-cli

      - id: deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          RESP=$(netlify deploy \
          --dir=dist \
          --json \
          --auth=$NETLIFY_AUTH_TOKEN \
          --site=$NETLIFY_SITE_ID)

          URL=$(echo $RESP | jq -r '.deploy_url')
          echo "url=$URL" >> $GITHUB_OUTPUT

# =========================
# GITHUB PAGES DEPLOY
# =========================

  github-pages:
    needs: bundle-analysis
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deploy
        uses: actions/deploy-pages@v4

# =========================
# LIGHTHOUSE AUDIT
# =========================

  lighthouse:
    needs: [netlify-preview, github-pages]
    runs-on: ubuntu-latest

    steps:

      - run: npm install -g lighthouse

      - name: Run Lighthouse
        run: |
          URL="${{ needs.netlify-preview.outputs.preview_url }}"

          lighthouse $URL \
            --chrome-flags="--headless" \
            --output=json \
            --output-path=report.json

      - name: Extract score
        id: score
        run: |
          SCORE=$(jq '.categories.performance.score*100|floor' report.json)
          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: lighthouse
          path: report.json

# =========================
# PERFORMANCE REGRESSION
# =========================

  regression-check:
    needs: lighthouse
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: lighthouse

      - run: |
          SCORE=$(jq '.categories.performance.score*100|floor' report.json)

          echo "Score: $SCORE"

          if [ "$SCORE" -lt "80" ]; then
            echo "Performance regression"
            exit 1
          fi

# =========================
# BADGE GENERATOR
# =========================

  badge:
    needs: lighthouse
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: lighthouse

      - run: |
          SCORE=$(jq '.categories.performance.score*100|floor' report.json)

          COLOR="red"

          if [ "$SCORE" -gt "90" ]; then
            COLOR="brightgreen"
          elif [ "$SCORE" -gt "80" ]; then
            COLOR="green"
          elif [ "$SCORE" -gt "70" ]; then
            COLOR="yellow"
          fi

          echo "https://img.shields.io/badge/Lighthouse-$SCORE-$COLOR" > badge.txt

      - uses: actions/upload-artifact@v4
        with:
          name: lighthouse-badge
          path: badge.txt

# =========================
# PR COMMENT
# =========================

  pr-comment:
    if: github.event_name == 'pull_request'
    needs: [netlify-preview, lighthouse]
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: lighthouse

      - id: score
        run: |
          SCORE=$(jq '.categories.performance.score*100|floor' report.json)
          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - uses: actions/github-script@v7
        with:
          script: |

            const score = "${{ steps.score.outputs.score }}"
            const url = "${{ needs.netlify-preview.outputs.preview_url }}"

            const body = `
🚀 Preview Ready

${url}

⚡ Lighthouse Score: ${score}

If performance drops below 80 the CI will fail.
`

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
